<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scotian Shores · Cleanup Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0e0e0e; --ocean:#1c4a42; --teal:#2d7a6e;
  --seafoam:#4aada0; --cream:#f5f1e8; --white:#fff; --accent:#c8a84b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:'Source Sans 3',sans-serif;background:var(--cream);overflow-x:hidden;}
.phone{width:100%;max-width:420px;min-height:100vh;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.25);}

/* ── Header ── */
.header{background:var(--black);padding:14px 20px 0;flex-shrink:0;position:sticky;top:0;z-index:50;}
.header::after{content:'';display:block;height:3px;margin-top:12px;background:linear-gradient(90deg,var(--teal),var(--seafoam),var(--accent),var(--seafoam),var(--teal));}
.header-top{display:flex;align-items:center;gap:10px;padding-bottom:12px;}
.back-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;color:white;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.header-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--white);}
.header-sub{font-size:10px;color:var(--seafoam);letter-spacing:.1em;text-transform:uppercase;margin-top:1px;}

/* ── Date bar ── */
.date-bar{background:var(--ocean);padding:14px;display:flex;gap:8px;}
.date-input{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;color:white;font-family:inherit;font-size:13px;outline:none;}
.date-input::placeholder{color:rgba(255,255,255,.45);}

/* ── Banner ── */
.total-banner{background:linear-gradient(135deg,var(--ocean),var(--teal));padding:16px 20px;text-align:center;position:relative;overflow:hidden;}
.total-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30 Q15 10 30 30 Q45 50 60 30' stroke='white' stroke-width='1' fill='none' opacity='0.06'/%3E%3C/svg%3E") repeat;}
.totals-row{display:flex;justify-content:center;gap:0;position:relative;}
.total-block{flex:1;text-align:center;}
.total-divider{width:1px;background:rgba(255,255,255,.2);align-self:stretch;margin:4px 0;}
.total-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:2px;}
.total-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:900;color:white;line-height:1;text-shadow:0 2px 16px rgba(0,0,0,.25);}
.total-unit{font-size:13px;color:rgba(255,255,255,.7);margin-left:2px;}
.total-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:8px;position:relative;}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center;}
.clear-cats-btn{font-size:9px;color:var(--accent);text-decoration:underline;cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:.05em;}

/* ── Category cards ── */
.categories{padding:0 14px;display:flex;flex-direction:column;gap:10px;}
.cat-card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:4px solid var(--teal);transition:transform .1s;}
.cat-card:active{transform:scale(.99);}
.cat-header{display:flex;align-items:center;padding:12px 14px 10px;gap:10px;cursor:pointer;user-select:none;}
.cat-emoji{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.cat-info{flex:1;}
.cat-name{font-size:15px;font-weight:700;color:var(--black);}
.cat-totals{font-size:11px;color:#999;margin-top:1px;}
.cat-toggle{font-size:18px;color:#ccc;transition:transform .2s ease;}
.cat-card.open .cat-toggle{transform:rotate(180deg);color:var(--teal);}
.cat-body{display:none;padding:0 14px 14px;}
.cat-card.open .cat-body{display:block;}

/* Two-col input */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.input-col label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:4px;padding-left:2px;}
.input-col input{width:100%;padding:9px 10px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;font-family:inherit;background:var(--cream);color:var(--black);outline:none;transition:border-color .2s;}
.input-col input:focus{border-color:var(--teal);}
.input-col input::placeholder{color:#ccc;}
.add-btn{width:100%;padding:10px;border-radius:10px;background:var(--teal);color:white;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;}
.add-btn:active{background:var(--ocean);}

/* Entries */
.entries-table{width:100%;border-collapse:collapse;margin-top:8px;}
.entries-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;font-weight:700;padding:4px 6px;text-align:left;border-bottom:1px solid #f0f0f0;}
.entries-table th.r{text-align:right;}
.entries-table td{font-size:13px;color:#444;padding:7px 6px;border-bottom:1px solid #fafafa;vertical-align:middle;}
.entries-table td.r{text-align:right;font-weight:700;color:var(--black);}
.del-btn{background:none;border:none;cursor:pointer;color:#e74c3c;font-size:14px;padding:2px 4px;}
.no-entries{font-size:12px;color:#ccc;text-align:center;padding:10px 0;font-style:italic;}

/* Custom cat creator */
.add-custom-wrap{padding:8px 14px 4px;}
.add-custom-btn{width:100%;padding:13px;background:none;border:2px dashed var(--seafoam);border-radius:14px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--teal);font-weight:600;}
.custom-creator{display:none;background:white;border-radius:14px;padding:14px;margin:8px 14px 0;box-shadow:0 2px 12px rgba(0,0,0,.08);border:2px solid var(--seafoam);}
.custom-creator.visible{display:block;}
.custom-creator input{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:var(--cream);color:var(--black);outline:none;margin-bottom:10px;}
.custom-creator input:focus{border-color:var(--teal);}
.custom-row{display:flex;gap:8px;}
.custom-create-btn{flex:1;padding:10px;background:var(--teal);color:white;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;}
.custom-cancel-btn{padding:10px 14px;background:#f0f0f0;color:#666;border:none;border-radius:10px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}

/* Summary */
.summary-card{margin:0 14px 8px;background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.summary-header{background:var(--black);padding:12px 16px;font-family:'Playfair Display',serif;font-size:15px;color:white;font-weight:700;}
.summary-table{width:100%;border-collapse:collapse;}
.summary-table th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;font-weight:700;padding:8px 14px 6px;text-align:left;border-bottom:1px solid #f0f0f0;}
.summary-table th.r{text-align:right;}
.summary-table td{padding:9px 14px;font-size:13px;color:#444;border-bottom:1px solid #f8f8f8;vertical-align:middle;}
.summary-table td.r{text-align:right;font-weight:700;color:var(--black);}
.summary-table td.pct{text-align:right;font-size:11px;color:#aaa;}
.summary-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle;}
.summary-total-row td{background:#f9f9f9;font-weight:700;font-size:15px;color:var(--black);border-bottom:none;padding:12px 14px;}
.prog-wrap{height:4px;background:#f0f0f0;margin:0 14px 2px;}
.prog-fill{height:4px;border-radius:2px;transition:width .4s;}

/* ── Report form ── */
.report-form{margin:0 14px;background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.form-header{background:var(--black);padding:12px 16px;font-family:'Playfair Display',serif;font-size:15px;color:white;font-weight:700;}
.form-body{padding:14px;}
.field-row{display:flex;gap:10px;margin-bottom:10px;}
.field-col{flex:1;min-width:0;}
.field-label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:4px;}
.field-input{width:100%;padding:10px 12px;border:2px solid #e4e4e4;border-radius:10px;font-family:inherit;font-size:14px;background:var(--cream);color:var(--black);outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--teal);}
.field-input::placeholder{color:#ccc;}
.gps-row{display:flex;gap:6px;align-items:center;}
.gps-input{flex:1;min-width:0;}
.gps-btn{width:40px;height:40px;border-radius:10px;background:var(--ocean);border:none;cursor:pointer;font-size:18px;flex-shrink:0;}
.gps-btn:active{background:var(--teal);}
.gps-status{font-size:11px;margin-top:3px;color:var(--teal);min-height:14px;}

/* ── Actions ── */
.action-btns{display:flex;gap:8px;margin:14px 14px 28px;}
.btn-reset{flex:1;padding:14px;background:#f5f1e8;border:2px solid #ddd;border-radius:14px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:#888;}
.btn-submit{flex:2;padding:14px;background:var(--teal);color:white;border:none;border-radius:14px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;box-shadow:0 4px 16px rgba(45,122,110,.3);}
.btn-submit:active{background:var(--ocean);}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:white;padding:12px 22px;border-radius:30px;font-size:13px;font-weight:600;transition:transform .3s,opacity .3s;opacity:0;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="phone">

  <div class="header">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()">‹</button>
      <div>
        <div class="header-title">Cleanup Counter</div>
        <div class="header-sub">Scotian Shores · Debris Tracker</div>
      </div>
    </div>
  </div>

  <div class="date-bar">
    <input class="date-input" type="text" id="sessionDate" placeholder="📅 Date">
  </div>

  <div class="total-banner">
    <div class="totals-row">
      <div class="total-block">
        <div class="total-lbl">Total Weight</div>
        <div class="total-num" id="grandLbs">0<span class="total-unit">lbs</span></div>
      </div>
      <div class="total-divider"></div>
      <div class="total-block">
        <div class="total-lbl">Total Items</div>
        <div class="total-num" id="grandItems">0<span class="total-unit">items</span></div>
      </div>
    </div>
    <div class="total-sub" id="totalSub">Add debris entries below to begin tracking</div>
  </div>

  <div class="section-label">
    Debris Categories
    <button class="clear-cats-btn" onclick="resetToDefaults()">Reset to Defaults</button>
  </div>
  <div class="categories" id="categoriesContainer"></div>

  <div class="add-custom-wrap">
    <button class="add-custom-btn" onclick="toggleCustom()">＋  Add Custom Category</button>
  </div>
  <div class="custom-creator" id="customCreator">
    <input type="text" id="customName" placeholder="Category name (e.g. Rope, Tires…)" maxlength="30">
    <div class="custom-row">
      <button class="custom-create-btn" onclick="createCustom()">Create</button>
      <button class="custom-cancel-btn" onclick="toggleCustom()">Cancel</button>
    </div>
  </div>

  <div class="section-label">Session Summary</div>
  <div class="summary-card">
    <div class="summary-header">📊  Breakdown by Category</div>
    <div id="summaryBody"><div style="padding:14px;font-size:13px;color:#ccc;text-align:center;">No entries yet</div></div>
  </div>

  <div class="section-label">Report Details</div>
  <div class="report-form">
    <div class="form-header">Cleanup Report</div>
    <div class="form-body">

      <div class="field-row">
        <div class="field-col">
          <label class="field-label">👤 Volunteer Name</label>
          <input class="field-input" type="text" id="fVolunteer" placeholder="Your name">
        </div>
        <div class="field-col">
          <label class="field-label">👥 # of People</label>
          <input class="field-input" type="number" id="fNumPeople" placeholder="e.g. 4" min="1">
        </div>
      </div>

      <div class="field-row">
        <div class="field-col">
          <label class="field-label">📍 Area / Beach Name</label>
          <input class="field-input" type="text" id="fArea" placeholder="e.g. Lawrencetown Beach">
        </div>
        <div class="field-col">
          <label class="field-label">👥 People Included</label>
          <input class="field-input" type="text" id="fPeopleIncluded" placeholder="e.g. Jane, Tom">
        </div>
      </div>

      <div class="field-row">
        <div class="field-col">
          <label class="field-label">🥁 Band Count</label>
          <input class="field-input" type="number" id="fBandCount" placeholder="0" min="0">
        </div>
        <div class="field-col">
          <label class="field-label">♻️ Diversion %</label>
          <input class="field-input" type="number" id="fDiversionPct" placeholder="e.g. 42" min="0" max="100">
        </div>
      </div>

      <div class="field-col" style="margin-bottom:10px;">
        <label class="field-label">📡 GPS Coordinates</label>
        <div class="gps-row">
          <input class="field-input gps-input" type="text" id="fGps" placeholder="Tap 🎯 to capture location">
          <button class="gps-btn" onclick="getGPS()">🎯</button>
        </div>
        <div class="gps-status" id="gpsStatus"></div>
      </div>

    </div>
  </div>

  <div class="action-btns">
    <button class="btn-reset"  onclick="confirmReset()">🗑 Reset Session</button>
    <button class="btn-submit" onclick="submitSession()">📧 Submit Report</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ─── Constants ────────────────────────────────────────────
const EMAIL_TO = 'ScotianShorescleanupalert@gmail.com';

const DEFAULTS = [
  {id:'plastic',  name:'Plastic',  emoji:'🧴', color:'#3b8fd4'},
  {id:'landfill', name:'Landfill', emoji:'🗑️', color:'#8a6a2e'},
  {id:'metal',    name:'Metal',    emoji:'⚙️', color:'#5a7a8a'},
];

// ─── State ────────────────────────────────────────────────
let builtinCats = loadBuiltins();
let customCats  = loadCustomCats();
let categories  = () => [...builtinCats, ...customCats];

// ─── Persistence ─────────────────────────────────────────
function loadBuiltins() {
  return DEFAULTS.map(d => {
    const saved = localStorage.getItem('ss_builtin_' + d.id);
    const entries = saved ? JSON.parse(saved) : [];
    return { ...d, entries };
  });
}

function loadCustomCats() {
  try { return JSON.parse(localStorage.getItem('ss_custom_cats') || '[]'); }
  catch(e) { return []; }
}

function persist() {
  builtinCats.forEach(c => {
    localStorage.setItem('ss_builtin_' + c.id, JSON.stringify(c.entries));
  });
  localStorage.setItem('ss_custom_cats', JSON.stringify(customCats));
}

// ─── Reset Categories ─────────────────────────────────────
function resetToDefaults() {
  if (!confirm('This will remove all custom categories and clear current totals. Continue?')) return;
  customCats = [];
  builtinCats.forEach(c => c.entries = []);
  localStorage.removeItem('ss_custom_cats');
  DEFAULTS.forEach(d => localStorage.removeItem('ss_builtin_' + d.id));
  renderAll();
  showToast('✓ Categories reset to defaults');
}

// ─── Totals ───────────────────────────────────────────────
const catLbs   = c => c.entries.reduce((s,e) => s+(e.lbs||0), 0);
const catItems = c => c.entries.reduce((s,e) => s+(e.items||0), 0);
const grandLbs   = () => categories().reduce((s,c) => s+catLbs(c), 0);
const grandItems = () => categories().reduce((s,c) => s+catItems(c), 0);

// ─── Render ───────────────────────────────────────────────
function renderAll() {
  renderCategories();
  renderTotals();
  renderSummary();
}

function renderTotals() {
  const lbs = grandLbs(), items = grandItems();
  document.getElementById('grandLbs').innerHTML   = lbs.toFixed(1) + '<span class="total-unit">lbs</span>';
  document.getElementById('grandItems').innerHTML = items + '<span class="total-unit">items</span>';
  const te = categories().reduce((s,c) => s+c.entries.length, 0);
  document.getElementById('totalSub').textContent = te > 0
    ? `${te} entr${te===1?'y':'ies'} · ${lbs.toFixed(1)} lbs · ${items} items`
    : 'Add debris entries below to begin tracking';
}

function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  const openIds = new Set([...container.querySelectorAll('.cat-card.open')].map(el => el.dataset.id));
  container.innerHTML = '';
  categories().forEach(cat => {
    const card = buildCard(cat);
    if (openIds.has(cat.id)) card.classList.add('open');
    container.appendChild(card);
  });
}

function buildCard(cat) {
  const lbs = catLbs(cat), items = catItems(cat);
  const div = document.createElement('div');
  div.className = 'cat-card';
  div.dataset.id = cat.id;
  div.style.borderLeftColor = cat.color || '#2d7a6e';

  div.innerHTML = `
    <div class="cat-header" onclick="toggleCard('${cat.id}')">
      <span class="cat-emoji">${cat.emoji||'📦'}</span>
      <div class="cat-info">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-totals">${lbs>0||items>0 ? `${lbs.toFixed(1)} lbs · ${items} items` : 'No entries yet'}</div>
      </div>
      <span class="cat-toggle">⌄</span>
    </div>
    <div class="cat-body">
      <div class="input-grid">
        <div class="input-col">
          <label>Weight (lbs)</label>
          <input type="number" id="lbs-${cat.id}" placeholder="0.0" min="0" step="0.1">
        </div>
        <div class="input-col">
          <label>Items Found</label>
          <input type="number" id="items-${cat.id}" placeholder="0" min="0" step="1">
        </div>
      </div>
      <button class="add-btn" onclick="addEntry('${cat.id}')">＋ Add Entry</button>
      ${buildEntriesTable(cat)}
    </div>
  `;
  return div;
}

function buildEntriesTable(cat) {
  if (!cat.entries.length) return `<div class="no-entries">No entries — add weights and item counts above</div>`;
  return `<table class="entries-table">
    <thead><tr><th>Entry</th><th class="r">Weight</th><th class="r">Items</th><th></th></tr></thead>
    <tbody>
      ${cat.entries.map((e,i) => `
        <tr>
          <td>Entry ${i+1}</td>
          <td class="r">${(e.lbs||0).toFixed(1)} lbs</td>
          <td class="r">${e.items||0}</td>
          <td><button class="del-btn" onclick="deleteEntry('${cat.id}',${i})">✕</button></td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderSummary() {
  const gl = grandLbs(), gi = grandItems();
  const body = document.getElementById('summaryBody');
  const active = categories().filter(c => catLbs(c)>0 || catItems(c)>0).sort((a,b) => catLbs(b)-catLbs(a));

  if (!active.length) {
    body.innerHTML = `<div style="padding:14px;font-size:13px;color:#ccc;text-align:center;">No entries yet</div>`;
    return;
  }

  const rows = active.map(c => {
    const pct = gl>0 ? ((catLbs(c)/gl)*100).toFixed(0) : 0;
    return `<tr>
      <td><span class="summary-dot" style="background:${c.color||'#4aada0'}"></span>${c.emoji||'📦'} ${c.name}</td>
      <td class="r">${catLbs(c).toFixed(1)}</td>
      <td class="r">${catItems(c)}</td>
      <td class="pct">${pct}%</td>
    </tr>`;
  }).join('');

  body.innerHTML = `
    <table class="summary-table">
      <thead><tr><th>Category</th><th class="r">lbs</th><th class="r">Items</th><th class="r">%</th></tr></thead>
      <tbody>
        ${rows}
        <tr class="summary-total-row">
          <td>🧹 TOTAL</td>
          <td class="r" style="color:var(--teal)">${gl.toFixed(1)} lbs</td>
          <td class="r" style="color:var(--teal)">${gi} items</td>
          <td></td>
        </tr>
      </tbody>
    </table>`;
}

// ─── Actions ─────────────────────────────────────────────
function toggleCard(id) {
  document.querySelector(`.cat-card[data-id="${id}"]`).classList.toggle('open');
}

function addEntry(catId) {
  const lbs   = parseFloat(document.getElementById(`lbs-${catId}`).value)   || 0;
  const items = parseInt(document.getElementById(`items-${catId}`).value, 10) || 0;
  if (lbs===0 && items===0) { showToast('⚠️ Enter a weight or item count'); return; }

  const cat = categories().find(c => c.id === catId);
  cat.entries.push({ lbs, items });
  document.getElementById(`lbs-${catId}`).value   = '';
  document.getElementById(`items-${catId}`).value = '';
  persist(); renderAll();
  document.querySelector(`.cat-card[data-id="${catId}"]`).classList.add('open');
}

function deleteEntry(catId, idx) {
  const cat = categories().find(c => c.id === catId);
  cat.entries.splice(idx, 1);
  persist(); renderAll();
  document.querySelector(`.cat-card[data-id="${catId}"]`).classList.add('open');
}

function toggleCustom() {
  const el = document.getElementById('customCreator');
  el.classList.toggle('visible');
}

function createCustom() {
  const name = document.getElementById('customName').value.trim();
  if (!name) return;
  customCats.push({ id:'custom_'+Date.now(), name, emoji:'📦', color:'#7a5a9a', entries:[] });
  document.getElementById('customName').value = '';
  toggleCustom(); persist(); renderAll();
}

function getGPS() {
  const status = document.getElementById('gpsStatus');
  status.textContent = '⏳ Getting location…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById('fGps').value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
      status.textContent = `✓ Captured`;
    },
    err => { status.textContent = '⚠️ GPS error'; },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

function confirmReset() {
  if (!confirm('Clear entries for this session?')) return;
  builtinCats.forEach(c => c.entries = []);
  customCats.forEach(c => c.entries = []);
  persist(); renderAll();
}

// ─── Submit ───────────────────────────────────────────────
function submitSession() {
  const v = id => (document.getElementById(id)?.value||'').trim();
  const date           = v('sessionDate') || new Date().toLocaleDateString('en-CA');
  const volunteer      = v('fVolunteer')  || 'Anonymous';
  const area           = v('fArea');
  const numPeople      = v('fNumPeople');
  const peopleIncluded = v('fPeopleIncluded');
  const bandCount      = v('fBandCount');
  const diversionPct   = v('fDiversionPct');
  const gps            = v('fGps');
  const gl = grandLbs(), gi = grandItems();

  const lines = [
    `SCOTIAN SHORES CLEANUP REPORT`,
    '==============================',
    `Date:             ${date}`,
    `Volunteer:        ${volunteer}`,
    `Area:             ${area}`,
    `# of People:      ${numPeople}`,
    `People Included:  ${peopleIncluded}`,
    `GPS:              ${gps||'Not captured'}`,
    '',
    `Total Weight:     ${gl.toFixed(1)} lbs`,
    `Total Items:      ${gi}`,
    `Band Count:       ${bandCount}`,
    `Diversion %:      ${diversionPct}`,
    '',
    'BREAKDOWN:',
  ];

  categories().filter(c => catLbs(c)>0).forEach(c => {
    lines.push(`${c.name}: ${catLbs(c).toFixed(1)} lbs, ${catItems(c)} items`);
  });

  // ── CSV Row Fix ──────────────────────────────────────
  // Correcting the order and ensuring 'Volunteer' is included as a specific column
  const csvHeaders = "Date,Volunteer,Pounds,Area,# of People,People Included,Band Count,Diversion Percentage,GPS COOR";
  const csvRow = [date, volunteer, gl.toFixed(1), area, numPeople, peopleIncluded, bandCount, diversionPct, gps]
    .map(val => { const s=String(val??''); return (s.includes(',')||s.includes('"')) ? '"'+s.replace(/"/g,'""')+'"' : s; })
    .join(',');

  lines.push('', 'GOOGLE SHEET ROW:', csvHeaders, csvRow);

  const subject = encodeURIComponent(`Cleanup Report — ${area||'Scotian Shores'} — ${date}`);
  const body    = encodeURIComponent(lines.join('\n'));
  window.location.href = `mailto:${EMAIL_TO}?subject=${subject}&body=${body}`;
  showToast('📧 Opening email client…');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('sessionDate').value = new Date().toLocaleDateString('en-CA');
renderAll();
</script>
